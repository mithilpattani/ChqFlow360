<title>ChqFlow360 — V4 Live Demo, Dummy Branding</title>
<style>
  /* ============ Outer review-tool chrome ============ */
  :root{
    --rv-bg:#F6F7FA; --rv-surface:#FFFFFF; --rv-border:#E1E4EC; --rv-text:#1B2033; --rv-text-dim:#5B6178; --rv-accent:#2563EB;
  }
  @media (prefers-color-scheme: dark){
    :root{ --rv-bg:#0E1016; --rv-surface:#171A23; --rv-border:#2A2E3C; --rv-text:#E9EAF2; --rv-text-dim:#9297AC; --rv-accent:#5B8CFF; }
  }
  :root[data-theme="light"]{ --rv-bg:#F6F7FA; --rv-surface:#FFFFFF; --rv-border:#E1E4EC; --rv-text:#1B2033; --rv-text-dim:#5B6178; --rv-accent:#2563EB; }
  :root[data-theme="dark"]{ --rv-bg:#0E1016; --rv-surface:#171A23; --rv-border:#2A2E3C; --rv-text:#E9EAF2; --rv-text-dim:#9297AC; --rv-accent:#5B8CFF; }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--rv-bg); color:var(--rv-text);
    font-family:'Aptos','Segoe UI',system-ui,-apple-system,sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .review-wrap{max-width:1440px;margin:0 auto;padding:28px 20px 60px;}
  .review-header{display:flex;flex-wrap:wrap;align-items:baseline;justify-content:space-between;gap:10px;margin-bottom:6px;}
  .review-header h1{font-size:22px;margin:0;font-weight:700;letter-spacing:-0.01em;}
  .review-header .sub{color:var(--rv-text-dim);font-size:13px;}
  .review-banner{
    background:var(--rv-surface); border:1px solid var(--rv-border); border-left:3px solid var(--rv-accent);
    border-radius:8px; padding:12px 16px; margin:16px 0 14px; font-size:13px; color:var(--rv-text-dim); line-height:1.55;
  }
  .review-banner b{color:var(--rv-text);}
  .changelog{
    background:var(--rv-surface); border:1px solid var(--rv-border); border-radius:8px; padding:12px 16px; margin:0 0 22px;
    font-size:12.5px; color:var(--rv-text-dim); line-height:1.7;
  }
  .changelog b{color:var(--rv-text);}
  .changelog code{background:var(--rv-bg);border:1px solid var(--rv-border);border-radius:4px;padding:1px 5px;font-size:11px;}
  .progress-row{display:flex;align-items:center;gap:12px;margin:14px 0 20px;flex-wrap:wrap;}
  .progress-track{flex:1;min-width:180px;height:6px;background:var(--rv-border);border-radius:99px;overflow:hidden;}
  .progress-fill{height:100%;background:var(--rv-accent);border-radius:99px;transition:width .25s ease;}
  .progress-label{font-size:12px;color:var(--rv-text-dim);font-variant-numeric:tabular-nums;white-space:nowrap;}
  .jump-chip-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:22px;}
  .jump-chip{
    font-size:11.5px; padding:5px 10px; border-radius:99px; border:1px solid var(--rv-border); background:var(--rv-surface);
    color:var(--rv-text-dim); cursor:pointer; font-family:inherit;
  }
  .jump-chip.active{background:var(--rv-accent); color:#fff; border-color:var(--rv-accent);}
  .jump-chip.touched::after{content:" \25CF"; font-size:7px; color:#F59E0B; vertical-align:middle;}
  .frame{
    border:1px solid var(--rv-border); border-radius:14px; overflow:hidden; background:#0B0B10;
    box-shadow:0 1px 2px rgba(0,0,0,.04), 0 10px 30px -12px rgba(0,0,0,.25);
  }
  .frame-toolbar{
    display:flex; align-items:center; justify-content:space-between; padding:8px 14px; background:var(--rv-surface);
    border-bottom:1px solid var(--rv-border);
  }
  .frame-toolbar .dots{display:flex;gap:6px;}
  .frame-toolbar .dots span{width:9px;height:9px;border-radius:50%;background:var(--rv-border);}
  .frame-toolbar .fname{font-size:12px;color:var(--rv-text-dim);font-variant-numeric:tabular-nums;}
  .nav-btns{display:flex;justify-content:space-between;align-items:center;margin-top:16px;gap:10px;}
  .navbtn{
    font-family:inherit; font-size:13px; font-weight:600; padding:9px 16px; border-radius:8px; border:1px solid var(--rv-border);
    background:var(--rv-surface); color:var(--rv-text); cursor:pointer;
  }
  .navbtn:hover{border-color:var(--rv-accent); color:var(--rv-accent);}
  .navbtn:disabled{opacity:.35; cursor:default;}
  .navbtn:disabled:hover{border-color:var(--rv-border); color:var(--rv-text);}
  .screen-title-row{display:flex;align-items:baseline;gap:10px;margin:22px 0 6px;flex-wrap:wrap;}
  .screen-title-row .idx{font-size:12px;color:var(--rv-accent);font-weight:700;font-variant-numeric:tabular-nums;}
  .screen-title-row h2{font-size:17px;margin:0;font-weight:700;}
  .screen-title-row .updated-tag{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:#F59E0B;background:rgba(245,158,11,.14);padding:2px 8px;border-radius:99px;}
  .screen-note{font-size:12.5px;color:var(--rv-text-dim);margin:0 0 12px;max-width:78ch;line-height:1.55;}
  .screen-note b{color:var(--rv-text);}

  /* ============ App mock — real ChqFlow360 palette ============ */
  .app-shell{
    --bg:#0B0B10; --surface:#15151D; --card:#181823; --card2:#1A1A25; --input:#191923; --border:#2B2B3D; --border-lt:#303040;
    --text:#FFFFFF; --text-dim:#9CA3AF; --text-muted:#8E8EA5; --placeholder:#6B7280;
    --primary:#2563EB; --primary-hover:#3B82F6; --primary-light:#60A5FA;
    --purple:#7C3AED; --purple-glow:rgba(37,99,235,.20);
    --success:#22C55E; --warning:#F59E0B; --danger:#EF4444; --info:#38BDF8;
    background:var(--bg); color:var(--text); font-size:12px; line-height:1.5;
    height:740px; display:flex; flex-direction:column; position:relative;
  }
  .app-shell.light-theme{
    --bg:#F5F7FC; --surface:#FFFFFF; --card:#FFFFFF; --card2:#F2F4FA; --input:#F2F4FA; --border:#E2E6F0; --border-lt:#D7DCEA;
    --text:#0E1E4A; --text-dim:#5A6386; --text-muted:#7883A6; --placeholder:#9AA3C0;
    --primary:#1D4ED8; --primary-hover:#1640B0; --primary-light:#2563EB;
    --purple:#7C3AED; --purple-glow:rgba(29,78,216,.14);
    --success:#16A34A; --warning:#B45309; --danger:#DC2626; --info:#0284C7;
  }
  .app-shell *{box-sizing:border-box;}
  .app-shell button, .app-shell input, .app-shell select{font-family:inherit;}
  @media (prefers-reduced-motion: reduce){ .app-shell *{transition:none !important; animation:none !important;} }

  .logo-blue{color:var(--primary);font-weight:800;}
  .logo-amber{color:var(--warning);font-weight:800;}

  /* topbar */
  .app-topbar{
    height:56px; flex:0 0 auto; display:flex; align-items:center; gap:16px; padding:0 18px;
    border-bottom:1px solid var(--border); background:var(--surface);
  }
  .brand{display:flex;align-items:end;gap:8px;font-weight:800;font-size:16px;letter-spacing:-.01em;white-space:nowrap;}
  .brand .tenant{font-weight:600;color:var(--text-dim);font-size:11.5px;}
  .top-workspace{
    height:34px; background:var(--card2); border:1px solid var(--border-lt); border-radius:9px; padding:0 12px; display:flex;
    align-items:center; color:var(--text); font-size:11px; font-weight:600; margin-right:auto; max-width:220px; overflow:hidden;
    white-space:nowrap; text-overflow:ellipsis;
  }
  .top-search{
    width:260px; display:flex; align-items:center; gap:7px; background:var(--card2); border:1px solid var(--border-lt);
    border-radius:9px; padding:7px 10px; color:var(--placeholder); font-size:11.5px;
  }
  .top-actions{margin-left:14px; display:flex; align-items:center; gap:9px;}
  .icon-btn{
    width:30px;height:30px;border-radius:9px;border:1px solid var(--border-lt);background:var(--card2);color:var(--text);
    display:flex;align-items:center;justify-content:center;position:relative;cursor:default;font-size:12px;
  }
  .icon-btn:hover{border-color:var(--primary); color:var(--primary-light);}
  .icon-btn .badge-dot{position:absolute;top:-4px;right:-4px;background:var(--danger);color:#fff;font-size:9px;font-weight:700;
    border-radius:99px;min-width:14px;height:14px;display:flex;align-items:center;justify-content:center;padding:0 3px;}
  .theme-toggle{display:flex;align-items:center;gap:6px;font-size:10.5px;color:var(--text-dim);}
  .switch{width:34px;height:19px;border-radius:99px;background:var(--card2);border:1px solid var(--border-lt);position:relative;cursor:pointer;flex:0 0 auto;}
  .switch .knob{position:absolute;top:2px;left:2px;width:13px;height:13px;border-radius:50%;background:var(--primary);transition:left .15s ease;}
  .app-shell.light-theme .switch .knob{left:17px;}
  .avatar{width:32px;height:32px;border-radius:50%;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;}
  .user-meta{line-height:1.25;}
  .user-meta .n{font-size:11.5px;font-weight:700;color:var(--text);}
  .user-meta .r{font-size:9.5px;color:var(--text-muted);}

  /* body: sidebar + main */
  .app-body{flex:1;display:flex;min-height:0;}
  .app-sidebar{
    width:198px; flex:0 0 auto; background:var(--surface); border-right:1px solid var(--border);
    display:flex; flex-direction:column;
  }
  .sidebar-logo{padding:16px 14px 12px; border-bottom:1px solid var(--border); text-align:center;}
  .sidebar-logo .mark{font-size:22px;font-weight:800;}
  .sidebar-logo .pname{font-size:12px;font-weight:700;color:var(--text);margin-top:2px;}
  .sidebar-scroll{flex:1; overflow-y:auto; padding:10px 8px;}
  .nav-group-label{font-size:9.5px; text-transform:uppercase; letter-spacing:.08em; color:var(--text-muted); font-weight:700; padding:10px 8px 6px;}
  .nav-item{
    display:flex; align-items:center; gap:9px; padding:8px 10px; border-radius:8px; font-size:11.5px; color:var(--text-dim);
    cursor:pointer; margin-bottom:1px; font-weight:600; border-left:3px solid transparent;
  }
  .nav-item .ico{width:16px;text-align:center;font-size:12px;opacity:.9;}
  .nav-item.active{background:var(--card2); color:var(--text); border-left-color:var(--primary); font-weight:700;}
  .nav-item .count{margin-left:auto; font-size:9px; background:var(--card2); color:var(--text-muted); padding:1px 6px; border-radius:99px; font-variant-numeric:tabular-nums;}
  .nav-item.active .count{background:var(--primary); color:#fff;}
  .sidebar-foot{padding:12px;border-top:1px solid var(--border);font-size:10px;color:var(--text-muted);text-align:center;}

  .app-main{flex:1; overflow:auto; padding:22px; min-width:0;}
  .page-head{display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:18px; flex-wrap:wrap; gap:10px;}
  .page-head h3{font-size:19px; margin:0; font-weight:800; letter-spacing:-.01em;}
  .page-head .desc{font-size:11.5px; color:var(--text-dim); margin-top:4px;}
  .head-actions{display:flex;gap:8px;}
  .breadcrumb{font-size:10.5px;color:var(--text-muted);margin-bottom:3px;}

  /* generic components */
  .btn{
    font-size:11.5px; font-weight:700; padding:8px 14px; border-radius:9px; border:1px solid var(--border-lt);
    background:var(--card2); color:var(--text); cursor:default; display:inline-flex; align-items:center; gap:6px;
  }
  .btn.primary{background:var(--primary); border-color:var(--primary); color:#fff;}
  .btn.danger{background:rgba(239,68,68,.14); border-color:var(--danger); color:var(--danger);}
  .btn.ghost{background:transparent;}
  .btn.sm{padding:6px 11px;font-size:10.5px;}
  .btn.xs{padding:4px 8px;font-size:9px;border-radius:6px;gap:3px;}
  .btn.xs.success{background:var(--success); border-color:var(--success); color:#062b12;}
  .btn.xs.warning{background:var(--warning); border-color:var(--warning); color:#2b1b02;}
  .btn.xs.danger{background:var(--danger); border-color:var(--danger); color:#fff;}
  .row-actions{display:flex; gap:5px; flex-wrap:nowrap;}
  .select-col{width:26px;}
  .preview-modal{
    background:var(--card); border:1.5px solid var(--primary); border-radius:14px; padding:16px; margin-top:14px;
    box-shadow:0 16px 40px -12px var(--purple-glow);
  }
  .preview-modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
  .preview-modal-head h4{margin:0;font-size:13px;font-weight:800;display:flex;align-items:center;gap:8px;}
  .preview-modal-head .tag{font-size:9px;font-weight:800;text-transform:uppercase;color:var(--primary-light);background:rgba(37,99,235,.14);padding:2px 8px;border-radius:99px;}
  .preview-caption{font-size:10.5px;color:var(--text-muted);margin-top:10px;font-style:italic;}
  .card{background:var(--card); border:1px solid var(--border); border-radius:14px; padding:16px; transition:.2s;}
  .card:hover{border-color:var(--primary);}
  .card + .card{margin-top:12px;}
  .card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
  .card-head h4{font-size:13px;margin:0;font-weight:700;}
  .card-head .hint{font-size:10.5px;color:var(--text-muted);}
  .grid{display:grid;gap:14px;}
  .kpi-grid{grid-template-columns:repeat(auto-fit,minmax(150px,1fr));}
  .kpi{background:var(--card); border:1px solid var(--border); border-radius:14px; padding:16px; position:relative; overflow:hidden; transition:.2s; cursor:pointer;}
  .kpi::before{content:"";position:absolute;left:0;top:0;width:4px;height:100%;background:var(--bar,var(--primary));}
  .kpi:hover{transform:translateY(-3px); border-color:var(--bar,var(--primary)); box-shadow:0 10px 24px -8px var(--purple-glow);}
  .kpi.c-blue{--bar:var(--primary);} .kpi.c-green{--bar:var(--success);} .kpi.c-amber{--bar:var(--warning);} .kpi.c-red{--bar:var(--danger);} .kpi.c-cyan{--bar:var(--info);}
  .kpi .label{font-size:10.5px; color:var(--text-dim); margin-bottom:9px;}
  .kpi .value{font-size:26px; font-weight:800; font-variant-numeric:tabular-nums; letter-spacing:-.01em;}
  .kpi .delta{font-size:10.5px; margin-top:7px; font-weight:700;}
  .kpi .delta.up{color:var(--success);} .kpi .delta.down{color:var(--danger);} .kpi .delta.flat{color:var(--text-muted);}
  .kpi .kpi-link{font-size:9.5px; font-weight:800; color:var(--primary-light); margin-top:9px; opacity:.8;}
  .kpi:hover .kpi-link{opacity:1; text-decoration:underline;}
  table{width:100%; border-collapse:collapse; font-size:11.5px;}
  th{text-align:left; font-size:9.5px; text-transform:uppercase; letter-spacing:.05em; color:var(--text-muted); font-weight:700; padding:0 10px 9px; border-bottom:1px solid var(--border);}
  th.num{text-align:right;}
  td{padding:10px; border-bottom:1px solid var(--border); color:var(--text); vertical-align:middle;}
  tr:last-child td{border-bottom:none;}
  td.dim{color:var(--text-dim);}
  td.meta{color:var(--text-muted); font-size:10.5px;}
  .num{font-variant-numeric:tabular-nums; text-align:right;}
  .chip{display:inline-flex; align-items:center; gap:5px; font-size:10px; font-weight:700; padding:3px 9px; border-radius:99px;}
  .chip.success{background:rgba(34,197,94,.15); color:var(--success);}
  .chip.warning{background:rgba(245,158,11,.15); color:var(--warning);}
  .chip.critical{background:rgba(239,68,68,.15); color:var(--danger);}
  .chip.info{background:rgba(56,189,248,.15); color:var(--info);}
  .chip.neutral{background:rgba(156,163,175,.15); color:var(--text-dim);}
  .chip.redact{background:rgba(124,58,237,.15); color:var(--purple);}
  .chip::before{content:"";width:5px;height:5px;border-radius:50%;background:currentColor;}
  .badge-solid{display:inline-block; font-size:10px; font-weight:700; padding:5px 11px; border-radius:20px;}
  .badge-solid.success{background:var(--success); color:#062b12;}
  .badge-solid.warning{background:var(--warning); color:#2b1b02;}
  .badge-solid.danger{background:var(--danger); color:#fff;}
  .badge-solid.primary{background:var(--primary); color:#fff;}
  .field{display:flex; flex-direction:column; gap:5px;}
  .field label{font-size:10px; font-weight:700; color:var(--text-dim); text-transform:uppercase; letter-spacing:.04em;}
  .field label .req{color:var(--danger);}
  .field .input, .field .select{
    border:1px solid var(--border-lt); background:var(--input); border-radius:9px; padding:9px 10px; font-size:11.5px; color:var(--text);
  }
  .field .conf{font-size:9.5px; margin-top:2px; font-weight:700;}
  .field .conf.high{color:var(--success);} .field .conf.med{color:var(--warning);} .field .conf.low{color:var(--danger);}
  .form-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:12px;}
  .two-col{display:grid; grid-template-columns:1.15fr 1fr; gap:14px; align-items:start;}
  .img-placeholder{
    background:repeating-linear-gradient(135deg, var(--card2), var(--card2) 8px, var(--border) 8px, var(--border) 16px);
    border:1px dashed var(--border-lt); border-radius:11px; height:190px; display:flex; align-items:center; justify-content:center;
    color:var(--text-muted); font-size:10.5px; font-weight:600;
  }
  .dropzone{border:1.5px dashed var(--border-lt); border-radius:12px; padding:22px; text-align:center; color:var(--text-dim); font-size:11px; background:var(--card2);}
  .dropzone b{color:var(--text); display:block; margin-bottom:3px; font-size:12.5px;}
  .tag-row{display:flex; gap:6px; flex-wrap:wrap;}
  .tab-row{display:flex; gap:4px; border-bottom:1px solid var(--border); margin-bottom:14px; flex-wrap:wrap;}
  .tab{padding:8px 13px; font-size:11px; font-weight:700; color:var(--text-dim); border-bottom:2px solid transparent; margin-bottom:-1px;}
  .tab.active{color:var(--primary-light); border-color:var(--primary);}
  .tab.new-tag::after{content:"NEW"; font-size:8px; background:var(--warning); color:#2b1b02; padding:1px 5px; border-radius:99px; margin-left:6px; vertical-align:2px; font-weight:800;}
  .steps{display:flex; align-items:center; gap:0; margin:4px 0 18px;}
  .step{display:flex; align-items:center; gap:8px; flex:1;}
  .step .dot{width:23px;height:23px;border-radius:50%;background:var(--card2);border:1.5px solid var(--border-lt);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:var(--text-dim);flex:0 0 auto;}
  .step.done .dot{background:var(--success); border-color:var(--success); color:#062b12;}
  .step.now .dot{background:var(--primary); border-color:var(--primary); color:#fff;}
  .step .label{font-size:10.5px;color:var(--text-dim);font-weight:600;white-space:nowrap;}
  .step.done .label, .step.now .label{color:var(--text);}
  .step .bar{height:2px;background:var(--border);flex:1;margin:0 6px;}
  .step.done .bar{background:var(--success);}
  .side-list{display:flex;flex-direction:column;gap:2px;}
  .side-list .li{padding:9px 10px;border-radius:8px;font-size:11.5px;font-weight:600;color:var(--text-dim);display:flex;justify-content:space-between;cursor:default;}
  .side-list .li.active{background:var(--card2);color:var(--text);border-left:3px solid var(--primary);}
  .side-list .li .n{font-size:9.5px;background:var(--card2);padding:1px 6px;border-radius:99px;color:var(--text-muted);}
  .bar-chart{display:flex; align-items:flex-end; gap:6px; height:110px;}
  .bar-chart .b{flex:1; background:linear-gradient(180deg,var(--primary-light),var(--primary)); border-radius:5px 5px 0 0;}
  .bar-chart .col{flex:1; display:flex; flex-direction:column; align-items:center; gap:6px; height:100%; justify-content:flex-end;}
  .bar-chart .glabel{font-size:9px; color:var(--text-muted);}
  .progress-bar-row{margin-bottom:16px;}
  .progress-bar-row small{font-size:10.5px;color:var(--text-dim);}
  .progress-bar-track{height:8px;background:var(--input);border-radius:20px;overflow:hidden;margin-top:7px;}
  .progress-bar-fill{height:100%;border-radius:20px;}
  .empty{padding:26px 10px; text-align:center; color:var(--text-muted); font-size:11px;}
  .flow-note{background:rgba(37,99,235,.10); border:1px solid rgba(37,99,235,.35); color:var(--primary-light); border-radius:9px; padding:10px 12px; font-size:11px; font-weight:600; margin-bottom:14px;}
  .flow-note.amber{background:rgba(245,158,11,.10); border-color:rgba(245,158,11,.35); color:var(--warning);}
  .flow-note.purple{background:rgba(124,58,237,.10); border-color:rgba(124,58,237,.35); color:var(--purple);}
  .quicklink-row{display:flex; gap:8px; flex-wrap:wrap;}
  .quicklink{
    display:flex; align-items:center; gap:8px; background:var(--card2); border:1px solid var(--border-lt); border-radius:10px;
    padding:9px 12px; font-size:11px; font-weight:700; color:var(--primary-light);
  }
  .quicklink .n{background:var(--primary); color:#fff; font-size:9.5px; padding:1px 7px; border-radius:99px;}
  .agent-status-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:12px;}
  .agent-tile{background:var(--card); border:1px solid var(--border); border-left:4px solid var(--primary); border-radius:12px; padding:14px; transition:.2s;}

const KPI_LINK_MAP = [
  [/Cheque Inbox/i, 'inbox'],
  [/Capture/i, 'capture'],
  [/Fraud/i, 'fraud'],
  [/Approv/i, 'verify'],
  [/Reject/i, 'verify'],
  [/Queue/i, 'verify'],
  [/Batch/i, 'verify'],
  [/Verified/i, 'verify'],
  [/Trend/i, 'analytics'],
  [/Verification/i, 'verify'],
];

function wireKpiLinks(){
  document.querySelectorAll('.kpi').forEach(el=>{
    const linkEl = el.querySelector('.kpi-link');
    if(!linkEl) return;
    const txt = linkEl.textContent;
    const match = KPI_LINK_MAP.find(([re])=>re.test(txt));
    if(match){
      el.style.cursor = 'pointer';
      el.onclick = ()=>go(match[1]);
    }
  });
}

function render(){
  if(current === 'login'){
    stage.innerHTML = `<div class="app-shell light-theme" id="appShell">${BODIES.login()}</div>`;
    const signIn = document.querySelector('.login-card .btn.primary');
    if(signIn) signIn.onclick = ()=>go('dashboard');
    const ssoBtn = document.querySelector('.sso-continue');
    if(ssoBtn) ssoBtn.onclick = ()=>go('dashboard');
    const mt0 = document.getElementById('modeToggle');
    if(mt0){ mt0.onclick = ()=>{ deploymentMode = deploymentMode==='standalone' ? 'embedded' : 'standalone'; render(); }; }
    return;
  }
  const s = SCREENS.find(sc=>sc.key===current) || SCREENS[1];
  stage.innerHTML = shellChrome(s.key, BODIES[s.key]());
  const sw = document.getElementById('themeSwitch');
  if(sw){ sw.onclick = ()=>document.getElementById('appShell').classList.toggle('light-theme'); }
  const mt = document.getElementById('modeToggle');
  if(mt){ mt.onclick = ()=>{ deploymentMode = deploymentMode==='standalone' ? 'embedded' : 'standalone'; render(); }; }
  wireKpiLinks();
}
function go(key){ current = key; render(); window.scrollTo(0,0); }
document.getElementById('restartDemo').onclick = (e)=>{ e.preventDefault(); go('login'); };

let demoIndex = 0, demoPlaying = false, demoTimer = null, demoSpeed = 1;
const demoPlayer = document.getElementById('demoPlayer');

function openDemo(){
  demoPlayer.style.display = 'block';
  demoIndex = 0;
  renderDemoShell();
  demoPlaying = true;
  scheduleDemoNext();
}
function closeDemo(){
  demoPlaying = false;
  if(demoTimer) clearTimeout(demoTimer);
  demoPlayer.style.display = 'none';
  demoPlayer.innerHTML = '';
}
function renderDemoShell(){
  const dots = DEMO_SCRIPT.map((_,i)=>`<div class="demo-dot ${i<demoIndex?'done':''} ${i===demoIndex?'active':''}" onclick="goScene(${i})"></div>`).join('');
  demoPlayer.innerHTML = `<div class="app-shell demo-player">
    <button class="btn xs ghost demo-close" onclick="closeDemo()">&times; Exit Demo</button>
    <div class="demo-stage" id="demoStage"></div>
    <div class="demo-caption-bar">
      <div class="demo-caption-text" id="demoCaption"></div>
      <div class="demo-controls">
        <button class="demo-btn" id="demoPlayBtn" onclick="toggleDemoPlay()">&#9654;</button>
        <button class="demo-btn ghost" onclick="prevScene()">&#8249;</button>
        <button class="demo-btn ghost" onclick="nextScene()">&#8250;</button>
        <div class="demo-scrubber">${dots}</div>
        <div class="demo-scene-label" id="demoLabel"></div>
        <div class="demo-speed">
          <button onclick="setDemoSpeed(0.5)" id="spd0.5">0.5x</button>
          <button onclick="setDemoSpeed(1)" id="spd1" class="active">1x</button>
          <button onclick="setDemoSpeed(2)" id="spd2">2x</button>
        </div>
      </div>
    </div>
  </div>`;
  renderDemoScene();
}
function renderDemoScene(){
  const s = DEMO_SCRIPT[demoIndex];
  const stageEl = document.getElementById('demoStage');
  stageEl.innerHTML = `<div class="demo-scene active">${s.crumb?`<div class="breadcrumb" style="margin-bottom:4px;">${s.crumb}</div>`:''}${s.body}</div>`;
  document.getElementById('demoCaption').innerHTML = s.caption;
  document.getElementById('demoLabel').textContent = 'Scene '+(demoIndex+1)+' / '+DEMO_SCRIPT.length;
  const btn = document.getElementById('demoPlayBtn');
  if(btn) btn.innerHTML = demoPlaying ? '&#10074;&#10074;' : '&#9654;';
  [...document.querySelectorAll('.demo-dot')].forEach((d,i)=>{
    d.classList.toggle('done', i<demoIndex);
    d.classList.toggle('active', i===demoIndex);
  });
}
function scheduleDemoNext(){
  if(demoTimer) clearTimeout(demoTimer);
  if(!demoPlaying) return;
  const base = demoIndex===0 || demoIndex===DEMO_SCRIPT.length-1 ? 3200 : 4200;
  demoTimer = setTimeout(()=>{
    if(demoIndex < DEMO_SCRIPT.length-1){ demoIndex++; renderDemoScene(); scheduleDemoNext(); }
    else { demoPlaying = false; renderDemoScene(); }
  }, base/demoSpeed);
}
function toggleDemoPlay(){
  demoPlaying = !demoPlaying;
  renderDemoScene();
  if(demoPlaying) scheduleDemoNext(); else if(demoTimer) clearTimeout(demoTimer);
}
function goScene(i){
  demoIndex = Math.max(0, Math.min(DEMO_SCRIPT.length-1, i));
  renderDemoScene();
  if(demoPlaying) scheduleDemoNext();
}
function nextScene(){ if(demoIndex<DEMO_SCRIPT.length-1){ goScene(demoIndex+1); } }
function prevScene(){ if(demoIndex>0){ goScene(demoIndex-1); } }
function setDemoSpeed(x){
  demoSpeed = x;
  ['0.5','1','2'].forEach(v=>document.getElementById('spd'+v).classList.toggle('active', parseFloat(v)===x));
  if(demoPlaying) scheduleDemoNext();
}

render();
</script>
